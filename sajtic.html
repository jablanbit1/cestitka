<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Za Sofiju 🎁</title>
  <style>
    :root {
      --bg1: #5c0814;
      --bg2: #8d1022;
      --bg3: #b51a2c;
      --gold: #ffd27d;
      --cream: #fff7ee;
      --text: #fff7f4;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 25%),
                  linear-gradient(160deg, var(--bg3), var(--bg1));
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 10%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.06), transparent 12%),
        radial-gradient(circle at 60% 70%, rgba(255,255,255,0.05), transparent 14%);
      pointer-events: none;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .fireworks {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .burst {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 14px rgba(255,255,255,0.9);
      opacity: 0;
      animation: explode 1.2s ease-out forwards;
    }

    @keyframes explode {
      0% { transform: translate(0, 0) scale(0.8); opacity: 0; }
      15% { opacity: 1; }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.2);
        opacity: 0;
      }
    }

    .gift-wrap {
      position: relative;
      z-index: 2;
      display: grid;
      justify-items: center;
      gap: 18px;
      transform: translateY(0);
      transition: transform 0.9s cubic-bezier(.2,.8,.2,1), opacity 0.7s ease;
    }

    .gift-wrap.open {
      transform: translateY(95px);
    }

    .gift {
      width: min(280px, 70vw);
      aspect-ratio: 1 / 1;
      position: relative;
      cursor: pointer;
      filter: drop-shadow(var(--shadow));
      transform: translateZ(0);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .box {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 62%;
      border-radius: 18px;
      background:
        linear-gradient(135deg, #9c1328, #cf2942);
      border: 3px solid rgba(255,255,255,0.16);
      overflow: hidden;
    }

    .box::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0 38%, rgba(255,255,255,0.12) 38% 42%, transparent 42% 58%, rgba(255,255,255,0.12) 58% 62%, transparent 62%);
      opacity: 0.8;
    }

    .ribbon-vert,
    .ribbon-horz {
      position: absolute;
      background: linear-gradient(180deg, #ffe08c, #ffbf4d);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15) inset;
      z-index: 3;
    }

    .ribbon-vert {
      width: 16px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
    }

    .ribbon-horz {
      width: 100%;
      height: 16px;
      top: 20%;
      border-radius: 10px;
    }

    .lid {
      position: absolute;
      left: 50%;
      top: 4%;
      transform: translateX(-50%) rotate(0deg);
      width: 108%;
      height: 22%;
      border-radius: 18px;
      background: linear-gradient(135deg, #d83c54, #f25b6c);
      border: 3px solid rgba(255,255,255,0.16);
      transform-origin: center bottom;
      transition: transform 0.85s cubic-bezier(.2,.8,.2,1), top 0.85s cubic-bezier(.2,.8,.2,1), opacity 0.5s ease;
      z-index: 4;
    }

    .lid::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -22px;
      transform: translateX(-50%);
      width: 58%;
      height: 32px;
      border-radius: 18px 18px 8px 8px;
      background: linear-gradient(135deg, #ffd27d, #ffb347);
      clip-path: polygon(0 100%, 18% 0, 50% 36%, 82% 0, 100% 100%, 0 100%);
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.18));
    }

    .gift.open .lid {
      top: -46px;
      transform: translateX(-50%) rotate(-10deg) scale(0.92);
      opacity: 0.35;
    }

    .card {
      position: absolute;
      left: 50%;
      bottom: 20%;
      transform: translateX(-50%) translateY(54px) scale(0.94);
      width: min(320px, 78vw);
      background: rgba(255, 247, 238, 0.98);
      color: #5a1f2b;
      border-radius: 22px;
      padding: 20px 18px 18px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(90,31,43,0.1);
      opacity: 0;
      transition: transform 0.95s cubic-bezier(.2,.8,.2,1), opacity 0.65s ease;
      z-index: 5;
    }

    .gift.open .card {
      transform: translateX(-50%) translateY(-220px) scale(1);
      opacity: 1;
    }

    .card h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 4vw, 2.7rem);
      line-height: 1;
    }

    .card p {
      margin: 0;
      line-height: 1.6;
      font-size: 1rem;
    }

    .glow {
      position: absolute;
      inset: auto auto 4% 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(255,211,125,0.26), transparent 65%);
      filter: blur(10px);
      z-index: 1;
      pointer-events: none;
      animation: breathe 2.8s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) scale(0.92); opacity: 0.75; }
      50% { transform: translateX(-50%) scale(1.06); opacity: 1; }
    }

    .text-hint {
      z-index: 2;
      margin-top: 10px;
      font-size: 1rem;
      text-align: center;
      opacity: 0.92;
      max-width: 28ch;
      text-shadow: 0 1px 2px rgba(0,0,0,0.24);
    }

    .button-row {
      z-index: 2;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.96rem;
      color: #5a1f2b;
      background: linear-gradient(180deg, #fff5d6, #ffd27d);
      box-shadow: 0 10px 20px rgba(0,0,0,0.16);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:hover { transform: translateY(-2px); filter: brightness(1.03); }
    button:active { transform: translateY(1px) scale(0.99); }

    .opened-note {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      font-size: 0.92rem;
      opacity: 0.84;
    }

    .tap {
      display: inline-block;
      animation: tap 1.5s infinite ease-in-out;
    }

    @keyframes tap {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .shake {
      animation: shake 0.28s ease-in-out 2;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-1.2deg); }
      75% { transform: rotate(1.2deg); }
    }

    .footer {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 0.8rem;
      opacity: 0.6;
      text-align: center;
      width: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="fireworks" id="fireworks"></div>

    <div class="glow"></div>

    <div class="gift-wrap" id="giftWrap">
      <div class="gift" id="gift" role="button" tabindex="0" aria-label="Otvori poklon">
        <div style="position:absolute;top:36%;left:50%;transform:translate(-50%,-50%) rotate(-7deg);z-index:10;font-size:2rem;font-family:cursive;color:#fff8ef;text-shadow:0 4px 10px rgba(0,0,0,0.18);pointer-events:none;">
          click me!
        </div>
        <div class="card" id="card">
          <h1>Sofija 🎉</h1>
          <p>
            Srećan rođendan! Neka ti dan bude sladak, topao i pun lepih iznenađenja.
            Da ti se smeh lepi za lice, a lepi trenuci množe sami od sebe 💛
          </p>
        </div>
        <div class="lid"></div>
        <div class="box"></div>
        <div class="ribbon-vert"></div>
        <div class="ribbon-horz"></div>
      </div>

      <div class="text-hint" id="hint"></div>
    </div>

    
  </div>

  <script>
    const gift = document.getElementById('gift');
    const giftWrap = document.getElementById('giftWrap');
    const card = document.getElementById('card');
    const hint = document.getElementById('hint');
    const fireworks = document.getElementById('fireworks');
    
    let opened = false;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createFirework(x, y) {
      const colors = ['#fff7d6', '#ffd27d', '#ff8fa3', '#ffde59', '#ffffff'];
      const count = 26;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement('span');
        dot.className = 'burst';
        const angle = (Math.PI * 2 * i) / count;
        const dist = rand(60, 180);
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
        dot.style.background = colors[Math.floor(Math.random() * colors.length)];
        dot.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        dot.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        dot.style.animationDelay = rand(0, 80) + 'ms';
        dot.style.width = rand(3, 6) + 'px';
        dot.style.height = rand(3, 6) + 'px';
        fireworks.appendChild(dot);
        setTimeout(() => dot.remove(), 1500);
      }
    }

    function launchFireworks(amount = 5) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      for (let i = 0; i < amount; i++) {
        setTimeout(() => {
          createFirework(rand(w * 0.18, w * 0.82), rand(h * 0.10, h * 0.45));
        }, i * 180);
      }
    }

    function openGift() {
      if (opened) return;
      opened = true;
      gift.classList.add('open');
      giftWrap.classList.add('open');
      gift.classList.add('shake');
      hint.textContent = '';
      launchFireworks(8);
      setTimeout(() => gift.classList.remove('shake'), 700);
    }

    function moreMagic() {
      launchFireworks(10);
      gift.classList.add('shake');
      setTimeout(() => gift.classList.remove('shake'), 700);
    }

    gift.addEventListener('click', openGift);
    

    gift.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openGift();
      }
    });

    setInterval(() => {
      createFirework(
        rand(window.innerWidth * 0.12, window.innerWidth * 0.88),
        rand(window.innerHeight * 0.08, window.innerHeight * 0.42)
      );
    }, 900);

    setTimeout(() => launchFireworks(4), 400);
  </script>
</body>
</html>
